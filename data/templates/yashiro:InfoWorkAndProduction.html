<div class="yashiro-person-layout">

  <!-- ── Left aside: photo + bio ── -->
  <aside class="yashiro-person-aside">

    <semantic-query
      query='SELECT ?localImage WHERE {
        ?? crm:P138i_has_representation ?filename.
        BIND(REPLACE(STR(?filename),"https://yashiro.itatti.harvard.edu/","/assets/") as ?localImageNorm)
        BIND(REPLACE(?localImageNorm,"/assets/resource/assets/","/assets/") as ?localImage)
      } LIMIT 1'
      template="{{> imageTemplate}}">
      <template id="imageTemplate">
        {{#each bindings}}
          <img class="yashiro-person-photo" src="{{localImage.value}}" alt="" />
        {{/each}}
      </template>
    </semantic-query>

    <semantic-query
      query='SELECT DISTINCT ?info WHERE {
        ?? <http://www.cidoc-crm.org/cidoc-crm/P70i_is_documented_in> ?subtitle_node .
        ?subtitle_node rdf:value ?info .
      } LIMIT 10'
      template='{{> bioTemplate}}'>
      <template id='bioTemplate'>
        {{#each bindings}}
          <p class="yashiro-person-bio">{{info.value}}</p>
        {{/each}}
      </template>
    </semantic-query>

  </aside>

  <!-- ── Right: letters ── -->
  <div class="yashiro-person-letters">
    <h2 class="yashiro-person-section-title">Letters</h2>
    [[> yashiro:LetterSearch]]
  </div>

</div>

<style>
  .yashiro-person-layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 40px;
    align-items: start;
    padding: 32px 0;
  }

  .yashiro-person-aside {
    position: sticky;
    top: 120px;
  }

  .yashiro-person-photo {
    width: 100%;
    aspect-ratio: 3 / 4;
    object-fit: cover;
    border-radius: var(--itatti-radius-md);
    display: block;
    margin-bottom: 16px;
    background: var(--itatti-warm);
  }

  .yashiro-person-bio {
    font-family: var(--itatti-font-body);
    font-size: 13px;
    line-height: 1.65;
    color: var(--itatti-text-sub);
    margin: 0 0 10px;
  }

  .yashiro-person-section-title {
    font-family: var(--itatti-font-heading);
    font-size: 22px;
    font-weight: 400;
    color: var(--itatti-ink);
    margin: 0 0 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--itatti-border);
  }

  .yashiro-person-letters #simple-search,
  .yashiro-person-letters #main-container {
    padding: 0 !important;
    margin: 0 !important;
    max-width: 100% !important;
  }

  #simple-search .griddle-custom-row {
    justify-content: flex-start !important;
  }

  div#search-results {
    width: 100% !important;
    margin-left: 0 !important;
  }

  .contentExcerpt {
    display: inline-block;
    overflow: hidden;
    text-overflow: fade;
    height: 65px;
    margin-top: 10px;
  }

  .contentExcerpt:before {
    content: "";
    width: 100%;
    height: 100%;
    position: absolute;
    left: 0;
    top: 0;
    background: linear-gradient(transparent 50px, white);
  }

  .show-facet-button { display: none; }

  #search-results .nav-tabs { display: none; }

  .facet,
  .semantic-facet-holder {
    width: 100% !important;
    position: relative !important;
    border: none !important;
    padding: 0 !important;
  }

  .facet__category-selector-holder { display: none !important; }

  .FacetSlider--range input.form-control {
    width: 60px !important;
    min-width: 0 !important;
    padding: 4px !important;
  }

  .facet__relation__header {
    border: 1px solid var(--itatti-border);
    margin-top: 5px;
  }

  .facet__relation__header:hover,
  .facet__relation__header:focus {
    text-decoration: none;
    color: var(--itatti-text);
    background-color: var(--itatti-warm);
  }

  .rc-slider.FacetSlider--slider {
    width: 80%;
    margin-left: 10%;
  }

  @media (max-width: 900px) {
    .yashiro-person-layout {
      grid-template-columns: 1fr;
    }
    .yashiro-person-aside {
      position: static;
    }
    .yashiro-person-photo {
      aspect-ratio: 16 / 9;
    }
  }
</style>
