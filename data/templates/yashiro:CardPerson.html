<semantic-link class="no-underline" iri="{{subject.value}}">
<div class="person-card">
  <div class="person-card-inner">

    <div class="person-card-avatar">
      <div class="person-card-initial">{{initial.value}}</div>
      <semantic-query
        query='SELECT ?localImage WHERE {
          <{{subject.value}}> crm:P138i_has_representation ?filename.
          BIND(REPLACE(STR(?filename),"https://yashiro.itatti.harvard.edu/","/assets/") as ?localImageNorm)
          BIND(REPLACE(?localImageNorm,"/assets/resource/assets/","/assets/") as ?localImage)
        } LIMIT 1'
        template='{{> thumbTemplate }}'>
        <template id='thumbTemplate'>
          {{#each bindings}}
            <img class="person-card-photo" src="{{localImage.value}}" alt="" />
          {{/each}}
        </template>
      </semantic-query>
    </div>

    <div class="person-card-body">
      <h2 class="person-card-name">
        <semantic-link iri="{{subject.value}}"></semantic-link>
      </h2>

      <semantic-query
        query='SELECT DISTINCT ?info WHERE {
          <{{subject.value}}> <http://www.cidoc-crm.org/cidoc-crm/P70i_is_documented_in> ?subtitle_node .
          ?subtitle_node rdf:value ?info .
        } LIMIT 10'
        template='{{> documentedIn }}'>
        <template id='documentedIn'>
          {{#each bindings}}
            <div class="person-card-subtitle">{{info.value}}</div>
          {{/each}}
        </template>
      </semantic-query>

      <semantic-query
        query='SELECT (COUNT(DISTINCT ?letter) as ?count) WHERE {
          {
            ?subject crm:P1_is_identified_by ?letter .
            ?activity crm:P16_used_specific_object ?letter .
            ?activity crm:P01_has_domain ?carry .
            ?carry crm:P02_has_range <{{subject.value}}>
          } UNION {
            ?a oa:hasTarget ?target .
            ?target oa:hasSource ?letter .
            ?a oa:hasBody ?body .
            ?body crm:P1_is_identified_by <{{subject.value}}>
          }
        }'
        template='{{> mentionCount }}'>
        <template id='mentionCount'>
          {{#each bindings}}
            {{#ifCond count.value "!==" "0"}}
              <div class="person-card-mentions">Mentioned in {{count.value}} letters</div>
            {{/ifCond}}
          {{/each}}
        </template>
      </semantic-query>

    </div>

  </div>
</div>
</semantic-link>
